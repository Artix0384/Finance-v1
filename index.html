<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GS Equity Terminal v3.6</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #ffffff; --bg2: #f8f8f8; --bg3: #efefef;
      --b1: #888; --b2: #ccc; --b3: #e5e5e5;
      --t1: #111; --t2: #555; --t3: #999;
      --r: 10px; --rm: 7px;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #111; --bg2: #1a1a1a; --bg3: #222;
        --b1: #666; --b2: #333; --b3: #2a2a2a;
        --t1: #f0f0f0; --t2: #aaa; --t3: #555;
      }
    }
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'DM Sans',sans-serif;background:var(--bg3);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
    .T{background:var(--bg);border:0.5px solid var(--b3);border-radius:var(--r);display:flex;flex-direction:column;height:720px;width:100%;max-width:900px;overflow:hidden;box-shadow:0 4px 24px rgba(0,0,0,0.08);}
    .HDR{padding:9px 14px;border-bottom:0.5px solid var(--b3);background:var(--bg2);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
    .hlog{width:24px;height:24px;background:var(--t1);border-radius:3px;display:flex;align-items:center;justify-content:center;margin-right:8px;flex-shrink:0;}
    .ht{font-size:12px;font-weight:500;color:var(--t1);}
    .hs{font-size:10px;color:var(--t2);font-family:'IBM Plex Mono',monospace;}
    .sd{width:5px;height:5px;border-radius:50%;background:#22c55e;display:inline-block;margin-right:4px;}
    .ld{width:5px;height:5px;border-radius:50%;background:#22c55e;display:inline-block;margin-right:3px;animation:pulse 2s infinite;}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
    .mp{font-size:9px;font-family:'IBM Plex Mono',monospace;padding:2px 6px;border-radius:3px;border:0.5px solid;margin-left:3px;}
    .tw-p{border-color:#3b82f6;color:#3b82f6;background:rgba(59,130,246,.06);}
    .us-p{border-color:#f59e0b;color:#f59e0b;background:rgba(245,158,11,.06);}
    .gm-p{border-color:#4ade80;color:#16a34a;background:rgba(34,197,94,.08);}
    .TABS{display:flex;border-bottom:0.5px solid var(--b3);background:var(--bg2);flex-shrink:0;overflow-x:auto;}
    .TABS::-webkit-scrollbar{height:2px;}
    .TABS::-webkit-scrollbar-thumb{background:var(--b2);}
    .tb{flex-shrink:0;padding:7px 11px;font-size:11px;background:none;border:none;border-bottom:2px solid transparent;color:var(--t2);cursor:pointer;transition:all .15s;white-space:nowrap;font-family:'DM Sans',sans-serif;}
    .tb:hover{color:var(--t1);}
    .tb.on{color:var(--t1);border-bottom-color:var(--t1);font-weight:500;}
    .CON{flex:1;overflow-y:auto;display:flex;flex-direction:column;}
    .CON::-webkit-scrollbar{width:3px;}
    .CON::-webkit-scrollbar-thumb{background:var(--b2);border-radius:2px;}
    .sec{padding:12px 14px;display:flex;flex-direction:column;gap:10px;}
    .sh{font-size:10px;font-weight:500;color:var(--t2);font-family:'IBM Plex Mono',monospace;text-transform:uppercase;letter-spacing:.06em;}
    .mono{font-family:'IBM Plex Mono',monospace;}
    .pos{color:#16a34a;}.neg{color:#dc2626;}
    .fbtn{font-size:10px;font-family:'IBM Plex Mono',monospace;padding:3px 9px;border-radius:4px;border:0.5px solid var(--b2);background:var(--bg);color:var(--t2);cursor:pointer;transition:all .15s;}
    .fbtn:hover{background:var(--t1);color:var(--bg);}
    .fbtn:disabled{opacity:.4;cursor:not-allowed;}
    .abtn{font-size:11px;padding:7px 14px;border-radius:6px;border:0.5px solid var(--b2);background:var(--t1);color:var(--bg);cursor:pointer;font-family:'DM Sans',sans-serif;transition:opacity .15s;white-space:nowrap;}
    .abtn:hover{opacity:.8;}.abtn:disabled{opacity:.3;cursor:not-allowed;}
    .abtn.s{background:var(--bg2);color:var(--t1);}
    .dots span{display:inline-block;width:3px;height:3px;border-radius:50%;background:currentColor;animation:bk 1.1s infinite;}
    .dots span:nth-child(2){animation-delay:.2s;}.dots span:nth-child(3){animation-delay:.4s;}
    @keyframes bk{0%,80%,100%{opacity:.2}40%{opacity:1}}
    .card{border:0.5px solid var(--b3);border-radius:var(--rm);overflow:hidden;}
    .card-hd{padding:8px 12px;background:var(--bg2);border-bottom:0.5px solid var(--b3);font-size:11px;font-weight:500;display:flex;align-items:center;justify-content:space-between;}
    .card-bd{padding:10px 12px;}
    .sig-BUY{background:rgba(34,197,94,.12);color:#16a34a;border:0.5px solid rgba(34,197,94,.4);}
    .sig-WATCH{background:rgba(245,158,11,.12);color:#d97706;border:0.5px solid rgba(245,158,11,.4);}
    .sig-REDUCE{background:rgba(249,115,22,.12);color:#ea580c;border:0.5px solid rgba(249,115,22,.4);}
    .sig-STOP{background:rgba(239,68,68,.12);color:#dc2626;border:0.5px solid rgba(239,68,68,.4);}
    .sig-badge{font-size:18px;font-weight:500;padding:6px 18px;border-radius:5px;font-family:'IBM Plex Mono',monospace;letter-spacing:.04em;}
    .reg-bull,.reg-BULL{background:rgba(34,197,94,.1);color:#16a34a;border:0.5px solid rgba(34,197,94,.3);}
    .reg-range,.reg-RANGE{background:rgba(245,158,11,.1);color:#d97706;border:0.5px solid rgba(245,158,11,.3);}
    .reg-bear,.reg-BEAR{background:rgba(239,68,68,.1);color:#dc2626;border:0.5px solid rgba(239,68,68,.3);}
    .reg-b{font-size:10px;font-family:'IBM Plex Mono',monospace;padding:2px 8px;border-radius:4px;}
    .score-row{display:flex;align-items:center;gap:8px;margin-bottom:5px;}
    .score-lbl{font-size:10px;font-family:'IBM Plex Mono',monospace;color:var(--t2);min-width:40px;}
    .score-bg{flex:1;height:4px;background:var(--bg3);border-radius:2px;overflow:hidden;}
    .score-fill{height:100%;border-radius:2px;transition:width .4s;}
    .score-val{font-size:10px;font-family:'IBM Plex Mono',monospace;min-width:28px;text-align:right;}
    .steps{display:flex;gap:4px;overflow-x:auto;padding-bottom:3px;}
    .step{font-size:9px;font-family:'IBM Plex Mono',monospace;padding:3px 7px;border-radius:3px;border:0.5px solid var(--b3);color:var(--t3);white-space:nowrap;flex-shrink:0;}
    .step.done{border-color:#22c55e;color:#16a34a;background:rgba(34,197,94,.06);}
    .step.active{border-color:var(--t1);color:var(--t1);background:var(--bg2);}
    .rflag{font-size:9px;font-family:'IBM Plex Mono',monospace;padding:2px 6px;border-radius:3px;background:rgba(239,68,68,.08);color:#dc2626;border:0.5px solid rgba(239,68,68,.25);}
    .lv-g{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px;}
    .lv{text-align:center;padding:8px;border:0.5px solid var(--b3);border-radius:6px;background:var(--bg2);}
    .lv-l{font-size:9px;color:var(--t2);font-family:'IBM Plex Mono',monospace;margin-bottom:3px;text-transform:uppercase;}
    .lv-v{font-size:13px;font-weight:500;font-family:'IBM Plex Mono',monospace;}
    .conf-bg{height:5px;background:var(--bg3);border-radius:3px;margin-top:3px;overflow:hidden;}
    .conf-fill{height:100%;border-radius:3px;transition:width .4s;}
    .cmsg{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:10px;}
    .cmsg::-webkit-scrollbar{width:3px;}
    .msg{display:flex;gap:7px;align-items:flex-start;}
    .msg.u{flex-direction:row-reverse;}
    .av{width:24px;height:24px;border-radius:5px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:500;}
    .av.b{background:var(--t1);color:var(--bg);}
    .av.u{background:#3b82f6;color:#fff;}
    .bbl{max-width:83%;padding:8px 11px;border-radius:8px;font-size:12px;line-height:1.6;color:var(--t1);border:0.5px solid var(--b3);background:var(--bg);}
    .msg.u .bbl{background:var(--bg2);border-color:var(--b2);}
    .bbl strong{font-weight:500;}
    .qrow{padding:7px 12px;border-top:0.5px solid var(--b3);display:flex;gap:5px;overflow-x:auto;flex-shrink:0;background:var(--bg2);}
    .qrow::-webkit-scrollbar{height:2px;}
    .qbtn{font-size:10px;font-family:'IBM Plex Mono',monospace;padding:3px 8px;border-radius:4px;border:0.5px solid var(--b2);background:var(--bg);color:var(--t2);cursor:pointer;white-space:nowrap;flex-shrink:0;}
    .qbtn:hover{color:var(--t1);}
    .inpr{padding:9px 12px;border-top:0.5px solid var(--b3);display:flex;gap:6px;flex-shrink:0;align-items:flex-end;}
    .inpr textarea{flex:1;font-family:'DM Sans',sans-serif;font-size:12px;padding:7px 10px;border-radius:7px;border:0.5px solid var(--b2);background:var(--bg2);color:var(--t1);resize:none;outline:none;line-height:1.5;min-height:34px;max-height:75px;}
    .inpr textarea:focus{border-color:var(--b1);}
    .sbtn{width:34px;height:34px;border-radius:7px;border:none;background:var(--t1);color:var(--bg);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:16px;transition:opacity .15s;}
    .sbtn:disabled{opacity:.3;cursor:not-allowed;}
    .bg2g{display:grid;grid-template-columns:1fr 1fr;gap:9px;}
    .bc-hd{padding:8px 12px;background:var(--bg2);border-bottom:0.5px solid var(--b3);display:flex;align-items:center;justify-content:space-between;}
    .bc-t{font-size:12px;font-weight:500;color:var(--t1);}
    .bc-s{font-size:10px;color:var(--t2);font-family:'IBM Plex Mono',monospace;}
    .bc-bd{padding:9px 12px;min-height:70px;font-size:11px;line-height:1.65;color:var(--t1);}
    .bc-bd strong{font-weight:500;}
    .bc-em{color:var(--t3);text-align:center;padding:16px 0;font-size:11px;}
    .ev-item{display:flex;align-items:flex-start;gap:9px;padding:7px 0;border-bottom:0.5px solid var(--b3);}
    .ev-item:last-child{border-bottom:none;}
    .ev-d{font-size:10px;font-family:'IBM Plex Mono',monospace;color:var(--t3);min-width:44px;flex-shrink:0;margin-top:2px;}
    .ev-t{font-size:12px;font-weight:500;color:var(--t1);}
    .ev-s{font-size:11px;color:var(--t2);margin-top:1px;}
    .ev-hi{font-size:9px;font-family:'IBM Plex Mono',monospace;padding:1px 5px;border-radius:3px;margin-left:5px;background:rgba(239,68,68,.1);color:#dc2626;border:0.5px solid rgba(239,68,68,.3);}
    .ev-md{font-size:9px;font-family:'IBM Plex Mono',monospace;padding:1px 5px;border-radius:3px;margin-left:5px;background:rgba(245,158,11,.1);color:#d97706;border:0.5px solid rgba(245,158,11,.3);}
    .pf-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;padding:10px 14px 0;}
    .sc{background:var(--bg2);border-radius:var(--rm);padding:8px 10px;border:0.5px solid var(--b3);}
    .sl{font-size:10px;color:var(--t2);font-family:'IBM Plex Mono',monospace;margin-bottom:2px;}
    .sv{font-size:13px;font-weight:500;font-family:'IBM Plex Mono',monospace;}
    .pf-tbl,.log-tbl,.stop-tbl{width:100%;border-collapse:collapse;font-size:11px;}
    .pf-tbl th,.log-tbl th,.stop-tbl th{font-size:9px;font-weight:500;color:var(--t2);font-family:'IBM Plex Mono',monospace;padding:5px 7px;border-bottom:0.5px solid var(--b3);text-align:left;background:var(--bg2);text-transform:uppercase;white-space:nowrap;}
    .pf-tbl td,.log-tbl td,.stop-tbl td{padding:5px 7px;border-bottom:0.5px solid var(--b3);color:var(--t1);vertical-align:middle;}
    .pf-tbl tr:last-child td,.log-tbl tr:last-child td,.stop-tbl tr:last-child td{border-bottom:none;}
    .pf-tbl input,.stop-tbl input,.log-tbl input{width:65px;font-family:'IBM Plex Mono',monospace;font-size:11px;padding:2px 5px;border:0.5px solid var(--b2);border-radius:3px;background:var(--bg2);color:var(--t1);outline:none;}
    .icobtn{background:none;border:none;cursor:pointer;color:var(--t3);font-size:11px;padding:2px 3px;}
    .icobtn:hover{color:var(--t1);}
    .add-form{display:grid;grid-template-columns:1fr 1fr 70px 80px 80px auto;gap:7px;align-items:end;padding:8px 14px;background:var(--bg2);border-top:0.5px solid var(--b3);}
    .add-form label{font-size:9px;color:var(--t2);font-family:'IBM Plex Mono',monospace;display:block;margin-bottom:2px;}
    .add-form input,.add-form select{width:100%;font-family:'IBM Plex Mono',monospace;font-size:11px;padding:4px 6px;border:0.5px solid var(--b2);border-radius:4px;background:var(--bg);color:var(--t1);outline:none;}
    .cash-bar{display:flex;align-items:center;gap:8px;padding:8px 14px;border-top:0.5px solid var(--b3);}
    .cash-l{font-size:10px;color:var(--t2);font-family:'IBM Plex Mono',monospace;flex-shrink:0;}
    .cash-i{flex:1;font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:500;padding:4px 8px;border:0.5px solid var(--b2);border-radius:5px;background:var(--bg2);color:var(--t1);outline:none;}
    .mkt-b{font-size:9px;font-family:'IBM Plex Mono',monospace;padding:1px 5px;border-radius:3px;}
    .tw-b{background:rgba(59,130,246,.1);color:#3b82f6;border:0.5px solid rgba(59,130,246,.3);}
    .us-b{background:rgba(245,158,11,.1);color:#d97706;border:0.5px solid rgba(245,158,11,.3);}
    .yf-b{font-size:9px;font-family:'IBM Plex Mono',monospace;padding:1px 5px;border-radius:3px;background:rgba(99,102,241,.1);color:#6366f1;border:0.5px solid rgba(99,102,241,.3);}
    .ai-b{font-size:9px;font-family:'IBM Plex Mono',monospace;padding:1px 5px;border-radius:3px;background:rgba(245,158,11,.1);color:#d97706;border:0.5px solid rgba(245,158,11,.3);}
    .alloc-row{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
    .alloc-l{font-size:11px;font-family:'IBM Plex Mono',monospace;min-width:55px;}
    .alloc-bg{flex:1;height:4px;background:var(--bg3);border-radius:2px;overflow:hidden;}
    .alloc-fill{height:100%;border-radius:2px;transition:width .3s;}
    .alloc-pct{font-size:11px;font-family:'IBM Plex Mono',monospace;color:var(--t2);min-width:40px;text-align:right;}
    .warn-b{font-size:9px;font-family:'IBM Plex Mono',monospace;padding:1px 5px;border-radius:3px;background:rgba(239,68,68,.1);color:#dc2626;border:0.5px solid rgba(239,68,68,.3);margin-left:4px;}
    .stop-inp{width:90px;font-family:'IBM Plex Mono',monospace;font-size:11px;padding:3px 6px;border:0.5px solid var(--b2);border-radius:3px;background:var(--bg2);color:var(--t1);outline:none;}
    .tr-add{display:grid;grid-template-columns:85px 65px auto 80px 80px 1fr auto;gap:6px;align-items:end;padding:9px 14px;background:var(--bg2);border-top:0.5px solid var(--b3);}
    .tr-add label{font-size:9px;color:var(--t2);font-family:'IBM Plex Mono',monospace;display:block;margin-bottom:2px;}
    .tr-add input,.tr-add select{width:100%;font-family:'IBM Plex Mono',monospace;font-size:11px;padding:4px 6px;border:0.5px solid var(--b2);border-radius:4px;background:var(--bg);color:var(--t1);outline:none;}
    .insight-box{border:0.5px solid var(--b3);border-radius:var(--rm);padding:10px 12px;background:var(--bg2);font-size:12px;line-height:1.7;color:var(--t1);}
    .insight-box strong{font-weight:500;}
    .vi{flex:1;font-family:'IBM Plex Mono',monospace;font-size:13px;padding:7px 10px;border-radius:6px;border:0.5px solid var(--b2);background:var(--bg2);color:var(--t1);outline:none;text-transform:uppercase;}
    .vi:focus{border-color:var(--b1);}
    .key-banner{padding:8px 12px;border:0.5px solid rgba(34,197,94,.3);border-radius:var(--rm);background:rgba(34,197,94,.05);font-size:11px;color:#16a34a;display:flex;align-items:center;justify-content:space-between;}
    .key-warn{padding:8px 12px;border:0.5px solid rgba(239,68,68,.3);border-radius:var(--rm);background:rgba(239,68,68,.05);font-size:11px;color:#dc2626;display:flex;align-items:center;justify-content:space-between;}
    .bbl{max-height:280px;overflow:auto;}
    .bc-bd{max-height:180px;overflow:auto;}
    .summary-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
    .sum-card{border:0.5px solid var(--b3);border-radius:var(--rm);background:var(--bg2);padding:10px 12px;}
    .sum-l{font-size:9px;color:var(--t2);font-family:'IBM Plex Mono',monospace;text-transform:uppercase;letter-spacing:.05em;margin-bottom:3px;}
    .sum-v{font-size:18px;font-weight:500;font-family:'IBM Plex Mono',monospace;}
    .sum-note{font-size:11px;color:var(--t2);line-height:1.55;margin-top:4px;}
    .gauge-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;}
    .gauge-card{border:0.5px solid var(--b3);border-radius:var(--rm);background:var(--bg2);padding:10px 12px;display:flex;align-items:center;gap:10px;min-height:96px;}
    .gauge{--v:0;--gc:#16a34a;width:70px;height:70px;border-radius:50%;background:conic-gradient(var(--gc) calc(var(--v)*1%), var(--bg3) 0);position:relative;flex-shrink:0;box-shadow:inset 0 0 0 0.5px var(--b3);}
    .gauge::after{content:'';position:absolute;inset:8px;border-radius:50%;background:var(--bg2);border:0.5px solid var(--b3);}
    .gauge-val{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:'IBM Plex Mono',monospace;font-size:15px;font-weight:500;z-index:1;color:var(--t1);}
    .gauge-info{min-width:0;}
    .gauge-title{font-size:9px;color:var(--t2);font-family:'IBM Plex Mono',monospace;text-transform:uppercase;letter-spacing:.05em;margin-bottom:3px;}
    .gauge-status{font-size:13px;font-weight:500;color:var(--t1);margin-bottom:3px;}
    .notify-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
    .notify-row{display:flex;gap:6px;align-items:center;flex-wrap:wrap;}
    .notify-input{flex:1;min-width:180px;font-family:'IBM Plex Mono',monospace;font-size:10px;padding:6px 8px;border:0.5px solid var(--b2);border-radius:5px;background:var(--bg);color:var(--t1);outline:none;}
    .notify-time{width:82px;font-family:'IBM Plex Mono',monospace;font-size:11px;padding:5px 7px;border:0.5px solid var(--b2);border-radius:5px;background:var(--bg);color:var(--t1);outline:none;}
    .toggle{display:inline-flex;align-items:center;gap:5px;font-size:10px;font-family:'IBM Plex Mono',monospace;color:var(--t2);cursor:pointer;user-select:none;}
    .toggle input{accent-color:#16a34a;}
    .mini-list{display:flex;flex-direction:column;gap:6px;}
    .mini-item{font-size:11px;line-height:1.5;padding:7px 9px;border:0.5px solid var(--b3);border-radius:5px;background:var(--bg);}
    .pill-mini{font-size:9px;font-family:'IBM Plex Mono',monospace;padding:1px 5px;border-radius:3px;border:0.5px solid var(--b2);color:var(--t2);margin-left:4px;}
    @media(max-width:720px){.summary-grid,.gauge-grid,.notify-grid{grid-template-columns:1fr}.bg2g{grid-template-columns:1fr}.pf-stats{grid-template-columns:repeat(2,1fr)}}
  </style>
</head>
<body>
<div class="T">
  <div class="HDR">
    <div style="display:flex;align-items:center;">
      <div class="hlog">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <rect x="1" y="4" width="12" height="6" rx="1" fill="var(--bg)" opacity=".9"/>
          <rect x="3" y="6" width="2" height="2" fill="var(--t1)"/>
          <rect x="6" y="6" width="2" height="2" fill="var(--t1)"/>
          <rect x="9" y="6" width="2" height="2" fill="var(--t1)"/>
        </svg>
      </div>
      <div>
        <div class="ht"><span class="sd"></span>GS Equity Terminal <span style="color:var(--t3);font-size:10px">v3.6</span></div>
        <div class="hs"><span class="ld"></span>Claude Sonnet · Yahoo Finance Data Engine · 永豐大戶投</div>
      </div>
    </div>
    <div>
      <span class="mp tw-p">台股</span>
      <span class="mp us-p">美股</span>
      <span class="mp gm-p">Claude</span>
    </div>
  </div>
  <div class="TABS">
    <button class="tb on" onclick="sw('chat')">💬 聊天</button>

function clipText(v, limit){
  const t = String(v || '');
  return t.length > limit ? t.slice(0, limit) + '\n...[truncated]' : t;
}
function toClaudeMessages(userMsg, maxChars = TOKEN_SAFE.maxUserChars) {
  if (Array.isArray(userMsg)) {
    return userMsg
      .slice(-TOKEN_SAFE.maxHistoryMessages)
      .map(m => ({
        role: m.role === 'model' ? 'assistant' : 'user',
        content: clipText((m.parts || []).map(p => p.text || '').join('\n'), maxChars)
      }))
      .filter(m => m.content && m.content.trim());
  }
  return [{ role: 'user', content: clipText(userMsg, maxChars) }];
}

async function callClaude(userMsg, systemPrompt, useSearch = false, maxTokens = TOKEN_SAFE.defaultMaxTokens) {
  if (!APIKEY) { promptAPIKey(); throw new Error('請先設定 Claude API Key'); }
  const body = {
    model: CLAUDE_MODEL,
    max_tokens: maxTokens,
    temperature: 0.2,
    system: clipText(systemPrompt, TOKEN_SAFE.maxSystemChars),
    messages: toClaudeMessages(userMsg)
  };

  // 降低 rate limit 風險：只有早報/事件/需要新聞時才開 web_search，且限制 max_uses。
  if (useSearch) {
    body.tools = [{ type: 'web_search_20250305', name: 'web_search', max_uses: TOKEN_SAFE.searchMaxUses }];
  }

  const r = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',

      'Content-Type': 'application/json',
      'x-api-key': APIKEY,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true'
    },
    body: JSON.stringify(body)

  const d = await r.json().catch(() => ({}));
  if (!r.ok || d.error) {
    const msg = d.error?.message || `Claude API 錯誤 HTTP ${r.status}`;
    if (msg.includes('rate limit') || msg.includes('tokens per minute')) {

    }
    throw new Error(msg);
  }
  return (d.content || [])
    .filter(p => p.type === 'text')
    .map(p => p.text || '')

}

// ── YAHOO FINANCE DATA ENGINE ──
function cleanNums(arr){ return (arr||[]).filter(v=>v!==null&&v!==undefined&&!isNaN(v)).map(Number); }
function avg(arr){ const a=cleanNums(arr); return a.length?a.reduce((x,y)=>x+y,0)/a.length:null; }
function sma(arr,n){ const a=cleanNums(arr); if(a.length<n)return null; return avg(a.slice(-n)); }
function calcRSI(closes, period=14){
  const a=cleanNums(closes); if(a.length<=period)return null;
  let gains=0, losses=0;
  for(let i=a.length-period;i<a.length;i++){
    const diff=a[i]-a[i-1]; if(diff>=0)gains+=diff; else losses-=diff;
  }
  if(losses===0)return 100;
  const rs=gains/losses; return 100-(100/(1+rs));
}
function calcATR(highs,lows,closes,period=14){
  const h=cleanNums(highs), l=cleanNums(lows), c=cleanNums(closes);
  const len=Math.min(h.length,l.length,c.length); if(len<=period)return null;
  const tr=[];
  for(let i=len-period;i<len;i++){
    const prev=i>0?c[i-1]:c[i];
    tr.push(Math.max(h[i]-l[i], Math.abs(h[i]-prev), Math.abs(l[i]-prev)));
  }
  return avg(tr);
}
function pct(a,b){ return (a!==null&&b)?(a-b)/b*100:null; }
function dataQuality(d){
  if(!d)return {ok:false,label:'no_data',note:'Yahoo Finance 無資料'};

  return {ok:missing.length===0,label:missing.length?'partial':'complete',missing,updatedAt:d.updatedAt};
}
function localRegime(d){
  if(!d||!d.price||!d.ma20||!d.ma60)return 'range';
  if(d.price>d.ma20 && d.ma20>d.ma60)return 'bull';
  if(d.price<d.ma20 && d.ma20<d.ma60)return 'bear';
  return 'range';
}
function localBubble(d){
  if(!d||!d.ma60)return {status:'unknown',score:0,reason:'資料不足'};
  const dev=pct(d.price,d.ma60)||0, rsi=d.rsi||0, vr=d.volume&&d.avgVolume?d.volume/d.avgVolume:0;
  let score=0, reasons=[];
  if(dev>40){score+=45;reasons.push(`價格高於MA60 ${dev.toFixed(1)}%`);} else if(dev>25){score+=25;reasons.push(`價格高於MA60 ${dev.toFixed(1)}%`);} 
  if(rsi>80){score+=30;reasons.push(`RSI ${rsi.toFixed(1)}極熱`);} else if(rsi>75){score+=20;reasons.push(`RSI ${rsi.toFixed(1)}過熱`);} 
  if(vr>2){score+=15;reasons.push(`量能為20日均量 ${vr.toFixed(1)}x`);} 
  return {status:score>=55?'bubble':score>=25?'overheat':'normal',score:Math.min(score,100),reason:reasons.join('、')||'未見明顯泡沫訊號'};
}
function localShakeout(d){
  if(!d||!d.price||!d.ma20||!d.ma60)return {status:'unknown',score:0,reason:'資料不足'};
  const trend=d.ma20>d.ma60;
  const nearMA20=Math.abs(pct(d.price,d.ma20)||999)<=3;
  const rsiOk=d.rsi>=35&&d.rsi<=58;
  const volOk=d.volume&&d.avgVolume?d.volume/d.avgVolume>=1.2:false;
  let score=0, reasons=[];
  if(trend){score+=30;reasons.push('MA20>MA60多頭架構');}

}
function toYahooSymbol(code, market){
  const c=(code||'').trim().toUpperCase();
  if(c.startsWith('^')||c.includes('.')||c.includes('='))return c;
  return market==='TW'?c+'.TW':c;
}
async function fetchYahoo(code, market='US') {
  const sym = toYahooSymbol(code, market);

    try {
      const r = await fetch(`https://${host}.finance.yahoo.com/v8/finance/chart/${encodeURIComponent(sym)}?interval=1d&range=3mo`);

}

}

function pJSON(raw) {

}

function fmt(t) {
  if (!t) return '';

}

async function fetchDec() {
  const di = document.getElementById('DI');
  const code = (di?.value||'').trim().toUpperCase(); if (!code) return;
  S.decCode=code; S.decLoad=true; S.decResult=null; S.decSteps=[]; render();
  const iv = setInterval(()=>{ if(S.decSteps.length<7&&S.decLoad){S.decSteps.push(S.decSteps.length);render();}else clearInterval(iv); }, 700);
  try {
    const pf = S.pf.find(p=>p.code===code);
    const market = pf?.market || (/^\d{4}$/.test(code)?'TW':'US');
    const stockData = await fetchYahoo(code, market);
    if(stockData){ stockData.bubble=localBubble(stockData); stockData.shakeout=localShakeout(stockData); }
    const marketContext = await fetchMarketContext(market);
    const portfolioContext = {cash:S.cash, positions:S.pf, stopLoss:S.stopLoss, prices:S.prices};
    const packet = {symbol:code, market, stockData, marketContext, portfolioContext, dataQuality:dataQuality(stockData)};
    const prompt = `以下是 GS Terminal Data Engine 最新結構化資料，請以此為價格與技術指標唯一依據：\n${JSON.stringify(packet,null,2)}\n\n請依 v3.6 七步驟與 Final Decision Layer 輸出唯一 JSON 決策。若資料不足，請保守輸出 WATCH。`;
    const res = await callClaude(prompt, SYS.dec, false, 700);
    clearInterval(iv); S.decSteps=[0,1,2,3,4,5,6];
    const parsed = pJSON(res);
    S.decResult = parsed ? applyLocalGuards(parsed, packet) : {_raw:res};
  } catch(e) { clearInterval(iv); S.decResult={error:e.message}; }
  S.decLoad=false; render();
  const di2=document.getElementById('DI'); if(di2) di2.value=code;
}

  const risk=computeRisk();

function fallbackOne(packet){
  const twReg=packet?.markets?.tw?.regime||'range', usReg=packet?.markets?.us?.regime||'range';
  const bubbles=(packet?.holdings||[]).map(h=>h.data?localBubble(h.data).score:0);
  const shakes=(packet?.holdings||[]).map(h=>h.data?localShakeout(h.data).score:0);
  const b=Math.round(Math.max(20,...bubbles));

function computeRisk() {
  const pos=S.pf.map(p=>{const cp=S.prices[p.code]!==undefined?S.prices[p.code]:p.cost;const mv=cp*p.shares;const cb=p.cost*p.shares;const sl=S.stopLoss[p.code]||(p.cost*0.95);return{...p,price:cp,mv,cb,sl,maxLoss:(cp-sl)*p.shares,pnl:mv-cb};});
  const tMv=pos.reduce((a,p)=>a+p.mv,0);const tot=tMv+S.cash;
  pos.forEach(p=>{p.weight=tot>0?(p.mv/tot*100):0;});
  const tPnl=pos.reduce((a,p)=>a+p.pnl,0);const tCb=pos.reduce((a,p)=>a+p.cb,0);
  return{pos,tMv,tot,tPnl,tCb,dd:tCb>0?tPnl/tCb*100:0};
}

// ── TRADE LOG ──
function tStats() {
  const cl=S.trades.filter(t=>t.closed&&t.exitPrice);if(!cl.length)return null;
  const calc=t=>t.action==='BUY'?(t.exitPrice-t.price)*t.shares:(t.price-t.exitPrice)*t.shares;
  const wins=cl.filter(t=>calc(t)>0);const losses=cl.filter(t=>calc(t)<=0);
  const avgW=wins.length?wins.reduce((a,t)=>a+Math.abs((t.exitPrice-t.price)/t.price*100),0)/wins.length:0;
  const avgL=losses.length?losses.reduce((a,t)=>a+Math.abs((t.exitPrice-t.price)/t.price*100),0)/losses.length:0;
  return{total:cl.length,wins:wins.length,winRate:(wins.length/cl.length*100).toFixed(0),avgW:avgW.toFixed(1),avgL:avgL.toFixed(1),ratio:avgL>0?(avgW/avgL).toFixed(1):'—',totalPnl:cl.reduce((a,t)=>a+calc(t),0)};
}

    </div>
  </div>
  ${S.trades.length===0?`<div style="padding:20px;border:0.5px solid var(--b3);border-radius:var(--rm);background:var(--bg2);text-align:center;font-size:11px;color:var(--t3)">尚無交易紀錄。點「+ 記錄」開始追蹤每一筆交易</div>`
  :`<div class="card"><table class="log-tbl"><thead><tr><th>日期</th><th>代號</th><th>方向</th><th>進場</th><th>股數</th><th>出場</th><th>損益</th><th></th></tr></thead><tbody>
  ${[...open,...closed].map(t=>{const idx=S.trades.indexOf(t);const pl=t.exitPrice?((t.action==='BUY'?(t.exitPrice-t.price):(t.price-t.exitPrice))*t.shares):null;return`<tr>
    <td class="mono" style="font-size:10px">${t.date}</td>
    <td class="mono" style="font-weight:500">${t.code}</td>
    <td style="color:${t.action==='BUY'?'#16a34a':'#dc2626'};font-size:11px">${t.action==='BUY'?'買進':'賣出'}</td>
    <td class="mono">${nt(t.price,2)}</td>
    <td class="mono">${nt(t.shares,0)}</td>
    <td class="mono">${t.exitPrice?nt(t.exitPrice,2):'—'}</td>
    <td class="mono ${pl===null?'':(pl>=0?'pos':'neg')}">${pl===null?'—':(pl>=0?'+':'')+nt(pl,0)}</td>
    <td style="white-space:nowrap">${!t.closed?`<button class="icobtn" onclick="closePrompt(${idx})" title="平倉">⬛</button>`:''}<button class="icobtn" onclick="S.trades.splice(${idx},1);save();render()">✗</button></td>
  </tr>`;}).join('')}
  </tbody></table></div>`}
  ${S.showAddTrade?`<div class="tr-add">
    <div><label>代號</label><input id="t_c" placeholder="2330"></div>
    <div><label>市場</label><select id="t_m"><option>TW</option><option>US</option></select></div>
    <div><label>方向</label><select id="t_a"><option value="BUY">買進</option><option value="SELL">賣出</option></select></div>
    <div><label>進場價</label><input id="t_p" type="number" placeholder="800" step="0.01"></div>
    <div><label>股數</label><input id="t_s" type="number" placeholder="10"></div>
    <div><label>進場原因</label><input id="t_r" placeholder="突破月線+放量"></div>
    <button class="abtn" onclick="addTrade()">新增</button>
  </div>`:''}
  </div>`;
}

function addTrade(){const code=(document.getElementById('t_c')?.value||'').trim().toUpperCase();const action=document.getElementById('t_a')?.value||'BUY';const price=parseFloat(document.getElementById('t_p')?.value)||0;const shares=parseFloat(document.getElementById('t_s')?.value)||0;const reason=(document.getElementById('t_r')?.value||'').trim();if(!code||price<=0||shares<=0)return;const d=new Date();const date=`${d.getFullYear()}/${d.getMonth()+1}/${d.getDate()}`;S.trades.push({date,code,action,price,shares,reason,closed:false,exitPrice:null});S.showAddTrade=false;save();render();}

function closePrompt(i){const ep=parseFloat(prompt('輸入出場價格：'));if(!ep||isNaN(ep))return;S.trades[i].exitPrice=ep;S.trades[i].closed=true;const d=new Date();S.trades[i].exitDate=`${d.getFullYear()}/${d.getMonth()+1}/${d.getDate()}`;save();render();}

async function aiInsight(){
  S.insightLoad=true;render();
  const cl=S.trades.filter(t=>t.closed&&t.exitPrice);
  const sum=cl.map(t=>{const pl=t.action==='BUY'?(t.exitPrice-t.price)*t.shares:(t.price-t.exitPrice)*t.shares;return`${t.code} ${t.action} ${t.price}→${t.exitPrice} ×${t.shares} P&L:${pl.toFixed(0)} 原因:${t.reason||'—'}`;}).join('\n');
  try{
    const r=await callClaude(`分析以下交易紀錄：\n${clipText(sum,5000)}\n只輸出JSON。`,SYS.insight,false,700);
    const d=pJSON(r);
    if(d)S.tradeInsight=`<strong>📊 AI復盤分析</strong><br><br>勝率 <strong>${d.winRate}%</strong> · 盈虧比 <strong>${d.ratio}</strong> · 平均盈 +${d.avgWinPct}% / 平均虧 -${d.avgLossPct}%<br><br>✅ 最佳模式：${d.bestPattern}<br>❌ 最差模式：${d.worstPattern}<br><br>💡 ${d.conclusion}<br><br>${(d.suggestions||[]).map((s,i)=>`${i+1}. ${s}`).join('<br>')}`;
    else S.tradeInsight=r;
  }catch(e){S.tradeInsight='錯誤:'+e.message;}
  S.insightLoad=false;render();
}

// ── PERSIST ──
async function save(){try{localStorage.setItem('gsv35',JSON.stringify({pf:S.pf,cash:S.cash,stopLoss:S.stopLoss,trades:S.trades,notify:S.notify}));}catch(e){}}
async function load(){try{const r=localStorage.getItem('gsv35');if(r){const d=JSON.parse(r);if(d.pf)S.pf=d.pf;if(d.cash!==undefined)S.cash=d.cash;if(d.stopLoss)S.stopLoss=d.stopLoss;if(d.trades)S.trades=d.trades;if(d.notify)S.notify={...S.notify,...d.notify};}}catch(e){}}

(async()=>{await load();render();setInterval(checkAutoNotify,60000);setTimeout(checkAutoNotify,2500);})();
</script>
</body>
</html>
