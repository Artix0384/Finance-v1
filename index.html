<!DOCTYPE html>
<html>
<body>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=DM+Sans:wght@400;500&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
.T{font-family:'DM Sans',sans-serif;background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);display:flex;flex-direction:column;height:700px;overflow:hidden;}
.HDR{padding:9px 14px;border-bottom:0.5px solid var(--color-border-tertiary);background:var(--color-background-secondary);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.hlog{width:24px;height:24px;background:var(--color-text-primary);border-radius:3px;display:flex;align-items:center;justify-content:center;margin-right:8px;flex-shrink:0;}
.ht{font-size:12px;font-weight:500;color:var(--color-text-primary);}
.hs{font-size:10px;color:var(--color-text-secondary);font-family:'IBM Plex Mono',monospace;}
.sd{width:5px;height:5px;border-radius:50%;background:#22c55e;display:inline-block;margin-right:4px;}
.mp{font-size:9px;font-family:'IBM Plex Mono',monospace;padding:2px 6px;border-radius:3px;border:0.5px solid;margin-left:3px;}
.tw-pill{border-color:#3b82f6;color:#3b82f6;background:rgba(59,130,246,.06);}
.us-pill{border-color:#f59e0b;color:#f59e0b;background:rgba(245,158,11,.06);}
.live-dot{width:5px;height:5px;border-radius:50%;background:#22c55e;display:inline-block;margin-right:3px;animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.4;}}
.TABS{display:flex;border-bottom:0.5px solid var(--color-border-tertiary);background:var(--color-background-secondary);flex-shrink:0;overflow-x:auto;}
.TABS::-webkit-scrollbar{height:2px;}
.TABS::-webkit-scrollbar-thumb{background:var(--color-border-secondary);}
.tb{flex-shrink:0;padding:7px 10px;font-size:11px;background:none;border:none;border-bottom:2px solid transparent;color:var(--color-text-secondary);cursor:pointer;transition:all .15s;white-space:nowrap;font-family:'DM Sans',sans-serif;}
.tb:hover{color:var(--color-text-primary);}
.tb.on{color:var(--color-text-primary);border-bottom-color:var(--color-text-primary);font-weight:500;}
.CON{flex:1;overflow-y:auto;display:flex;flex-direction:column;}
.CON::-webkit-scrollbar{width:3px;}
.CON::-webkit-scrollbar-thumb{background:var(--color-border-secondary);border-radius:2px;}
.sec{padding:12px 14px;display:flex;flex-direction:column;gap:10px;}
.sh{font-size:10px;font-weight:500;color:var(--color-text-secondary);font-family:'IBM Plex Mono',monospace;text-transform:uppercase;letter-spacing:.06em;}
.mono{font-family:'IBM Plex Mono',monospace;}
.pos{color:#16a34a;}.neg{color:#dc2626;}
.fbtn{font-size:10px;font-family:'IBM Plex Mono',monospace;padding:3px 9px;border-radius:4px;border:0.5px solid var(--color-border-secondary);background:var(--color-background-primary);color:var(--color-text-secondary);cursor:pointer;transition:all .15s;}
.fbtn:hover{background:var(--color-text-primary);color:var(--color-background-primary);}
.fbtn:disabled{opacity:.4;cursor:not-allowed;}
.abtn{font-size:11px;padding:7px 14px;border-radius:6px;border:0.5px solid var(--color-border-secondary);background:var(--color-text-primary);color:var(--color-background-primary);cursor:pointer;font-family:'DM Sans',sans-serif;transition:opacity .15s;white-space:nowrap;}
.abtn:hover{opacity:.8;}.abtn:disabled{opacity:.3;cursor:not-allowed;}
.abtn.s{background:var(--color-background-secondary);color:var(--color-text-primary);}
.dots span{display:inline-block;width:3px;height:3px;border-radius:50%;background:currentColor;animation:bk 1.1s infinite;}
.dots span:nth-child(2){animation-delay:.2s;}.dots span:nth-child(3){animation-delay:.4s;}
@keyframes bk{0%,80%,100%{opacity:.2}40%{opacity:1}}
.card{border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);overflow:hidden;}
.card-hd{padding:8px 12px;background:var(--color-background-secondary);border-bottom:0.5px solid var(--color-border-tertiary);font-size:11px;font-weight:500;display:flex;align-items:center;justify-content:space-between;}
.card-bd{padding:10px 12px;}
/* SIGNAL */
.sig-BUY{background:rgba(34,197,94,.12);color:#16a34a;border:0.5px solid rgba(34,197,94,.4);}
.sig-WATCH{background:rgba(245,158,11,.12);color:#d97706;border:0.5px solid rgba(245,158,11,.4);}
.sig-REDUCE{background:rgba(249,115,22,.12);color:#ea580c;border:0.5px solid rgba(249,115,22,.4);}
.sig-STOP{background:rgba(239,68,68,.12);color:#dc2626;border:0.5px solid rgba(239,68,68,.4);}
.sig-badge{font-size:18px;font-weight:500;padding:6px 18px;border-radius:5px;font-family:'IBM Plex Mono',monospace;letter-spacing:.04em;}
.reg-BULL,.reg-bull{background:rgba(34,197,94,.1);color:#16a34a;border:0.5px solid rgba(34,197,94,.3);}
.reg-RANGE,.reg-range{background:rgba(245,158,11,.1);color:#d97706;border:0.5px solid rgba(245,158,11,.3);}
.reg-BEAR,.reg-bear{background:rgba(239,68,68,.1);color:#dc2626;border:0.5px solid rgba(239,68,68,.3);}
.reg-b{font-size:10px;font-family:'IBM Plex Mono',monospace;padding:2px 8px;border-radius:4px;}
/* SCORE BAR */
.score-row{display:flex;align-items:center;gap:8px;margin-bottom:5px;}
.score-lbl{font-size:10px;font-family:'IBM Plex Mono',monospace;color:var(--color-text-secondary);min-width:40px;}
.score-bg{flex:1;height:4px;background:var(--color-background-tertiary);border-radius:2px;overflow:hidden;}
.score-fill{height:100%;border-radius:2px;transition:width .4s;}
.score-val{font-size:10px;font-family:'IBM Plex Mono',monospace;min-width:28px;text-align:right;}
/* STEP */
.steps{display:flex;gap:4px;overflow-x:auto;padding-bottom:3px;}
.steps::-webkit-scrollbar{height:2px;}
.step{font-size:9px;font-family:'IBM Plex Mono',monospace;padding:3px 7px;border-radius:3px;border:0.5px solid var(--color-border-tertiary);color:var(--color-text-tertiary);white-space:nowrap;flex-shrink:0;}
.step.done{border-color:#22c55e;color:#16a34a;background:rgba(34,197,94,.06);}
.step.active{border-color:var(--color-text-primary);color:var(--color-text-primary);background:var(--color-background-secondary);}
/* RISK FLAGS */
.rflag{font-size:9px;font-family:'IBM Plex Mono',monospace;padding:2px 6px;border-radius:3px;background:rgba(239,68,68,.08);color:#dc2626;border:0.5px solid rgba(239,68,68,.25);}
/* LV */
.lv-g{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px;}
.lv{text-align:center;padding:8px;border:0.5px solid var(--color-border-tertiary);border-radius:6px;background:var(--color-background-secondary);}
.lv-l{font-size:9px;color:var(--color-text-secondary);font-family:'IBM Plex Mono',monospace;margin-bottom:3px;text-transform:uppercase;}
.lv-v{font-size:13px;font-weight:500;font-family:'IBM Plex Mono',monospace;}
/* CONF */
.conf-bg{height:5px;background:var(--color-background-tertiary);border-radius:3px;margin-top:3px;overflow:hidden;}
.conf-fill{height:100%;border-radius:3px;transition:width .4s;}
/* CHAT */
.cmsg{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:10px;}
.cmsg::-webkit-scrollbar{width:3px;}
.msg{display:flex;gap:7px;align-items:flex-start;}
.msg.u{flex-direction:row-reverse;}
.av{width:24px;height:24px;border-radius:5px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:500;}
.av.b{background:var(--color-text-primary);color:var(--color-background-primary);}
.av.u{background:#3b82f6;color:#fff;}
.bbl{max-width:83%;padding:8px 11px;border-radius:8px;font-size:12px;line-height:1.6;color:var(--color-text-primary);border:0.5px solid var(--color-border-tertiary);}
.msg.u .bbl{background:var(--color-background-secondary);border-color:var(--color-border-secondary);}
.bbl strong{font-weight:500;}
.qrow{padding:7px 12px;border-top:0.5px solid var(--color-border-tertiary);display:flex;gap:5px;overflow-x:auto;flex-shrink:0;background:var(--color-background-secondary);}
.qrow::-webkit-scrollbar{height:2px;}
.qbtn{font-size:10px;font-family:'IBM Plex Mono',monospace;padding:3px 8px;border-radius:4px;border:0.5px solid var(--color-border-secondary);background:var(--color-background-primary);color:var(--color-text-secondary);cursor:pointer;white-space:nowrap;flex-shrink:0;}
.qbtn:hover{color:var(--color-text-primary);}
.inpr{padding:9px 12px;border-top:0.5px solid var(--color-border-tertiary);display:flex;gap:6px;flex-shrink:0;align-items:flex-end;}
.inpr textarea{flex:1;font-family:'DM Sans',sans-serif;font-size:12px;padding:7px 10px;border-radius:7px;border:0.5px solid var(--color-border-secondary);background:var(--color-background-secondary);color:var(--color-text-primary);resize:none;outline:none;line-height:1.5;min-height:34px;max-height:75px;}
.inpr textarea:focus{border-color:var(--color-border-primary);}
.sbtn{width:34px;height:34px;border-radius:7px;border:none;background:var(--color-text-primary);color:var(--color-background-primary);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:opacity .15s;}
.sbtn:disabled{opacity:.3;cursor:not-allowed;}
/* BRIEF */
.bg2{display:grid;grid-template-columns:1fr 1fr;gap:9px;}
.bc-hd{padding:8px 12px;background:var(--color-background-secondary);border-bottom:0.5px solid var(--color-border-tertiary);display:flex;align-items:center;justify-content:space-between;}
.bc-t{font-size:12px;font-weight:500;}.bc-s{font-size:10px;color:var(--color-text-secondary);font-family:'IBM Plex Mono',monospace;}
.bc-bd{padding:9px 12px;min-height:70px;font-size:11px;line-height:1.65;}
.bc-bd strong{font-weight:500;}
.bc-em{color:var(--color-text-tertiary);text-align:center;padding:16px 0;font-size:11px;}
.ev-item{display:flex;align-items:flex-start;gap:9px;padding:7px 0;border-bottom:0.5px solid var(--color-border-tertiary);}
.ev-item:last-child{border-bottom:none;}
.ev-d{font-size:10px;font-family:'IBM Plex Mono',monospace;color:var(--color-text-tertiary);min-width:44px;flex-shrink:0;margin-top:2px;}
.ev-t{font-size:12px;font-weight:500;}
.ev-s{font-size:11px;color:var(--color-text-secondary);margin-top:1px;}
.ev-hi{font-size:9px;font-family:'IBM Plex Mono',monospace;padding:1px 5px;border-radius:3px;margin-left:5px;background:rgba(239,68,68,.1);color:#dc2626;border:0.5px solid rgba(239,68,68,.3);}
.ev-md{font-size:9px;font-family:'IBM Plex Mono',monospace;padding:1px 5px;border-radius:3px;margin-left:5px;background:rgba(245,158,11,.1);color:#d97706;border:0.5px solid rgba(245,158,11,.3);}
/* PF */
.pf-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;padding:10px 14px 0;}
.sc{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:8px 10px;border:0.5px solid var(--color-border-tertiary);}
.sl{font-size:10px;color:var(--color-text-secondary);font-family:'IBM Plex Mono',monospace;margin-bottom:2px;}
.sv{font-size:13px;font-weight:500;font-family:'IBM Plex Mono',monospace;}
.pf-tbl,.log-tbl,.stop-tbl{width:100%;border-collapse:collapse;font-size:11px;}
.pf-tbl th,.log-tbl th,.stop-tbl th{font-size:9px;font-weight:500;color:var(--color-text-secondary);font-family:'IBM Plex Mono',monospace;padding:5px 7px;border-bottom:0.5px solid var(--color-border-tertiary);text-align:left;background:var(--color-background-secondary);text-transform:uppercase;white-space:nowrap;}
.pf-tbl td,.log-tbl td,.stop-tbl td{padding:5px 7px;border-bottom:0.5px solid var(--color-border-tertiary);color:var(--color-text-primary);vertical-align:middle;}
.pf-tbl tr:last-child td,.log-tbl tr:last-child td,.stop-tbl tr:last-child td{border-bottom:none;}
.pf-tbl input,.stop-tbl input,.log-tbl input{width:65px;font-family:'IBM Plex Mono',monospace;font-size:11px;padding:2px 5px;border:0.5px solid var(--color-border-secondary);border-radius:3px;background:var(--color-background-secondary);color:var(--color-text-primary);outline:none;}
.icobtn{background:none;border:none;cursor:pointer;color:var(--color-text-tertiary);font-size:11px;padding:2px 3px;}
.icobtn:hover{color:var(--color-text-primary);}
.add-form{display:grid;grid-template-columns:1fr 1fr 70px 80px 80px auto;gap:7px;align-items:end;padding:8px 14px;background:var(--color-background-secondary);border-top:0.5px solid var(--color-border-tertiary);}
.add-form label{font-size:9px;color:var(--color-text-secondary);font-family:'IBM Plex Mono',monospace;display:block;margin-bottom:2px;}
.add-form input,.add-form select{width:100%;font-family:'IBM Plex Mono',monospace;font-size:11px;padding:4px 6px;border:0.5px solid var(--color-border-secondary);border-radius:4px;background:var(--color-background-primary);color:var(--color-text-primary);outline:none;}
.cash-bar{display:flex;align-items:center;gap:8px;padding:8px 14px;border-top:0.5px solid var(--color-border-tertiary);}
.cash-l{font-size:10px;color:var(--color-text-secondary);font-family:'IBM Plex Mono',monospace;flex-shrink:0;}
.cash-i{flex:1;font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:500;padding:4px 8px;border:0.5px solid var(--color-border-secondary);border-radius:5px;background:var(--color-background-secondary);color:var(--color-text-primary);outline:none;}
.mkt-b{font-size:9px;font-family:'IBM Plex Mono',monospace;padding:1px 5px;border-radius:3px;}
.tw-b{background:rgba(59,130,246,.1);color:#3b82f6;border:0.5px solid rgba(59,130,246,.3);}
.us-b{background:rgba(245,158,11,.1);color:#d97706;border:0.5px solid rgba(245,158,11,.3);}
.yahoo-b{font-size:9px;font-family:'IBM Plex Mono',monospace;padding:1px 5px;border-radius:3px;background:rgba(99,102,241,.1);color:#6366f1;border:0.5px solid rgba(99,102,241,.3);}
.ai-b{font-size:9px;font-family:'IBM Plex Mono',monospace;padding:1px 5px;border-radius:3px;background:rgba(245,158,11,.1);color:#d97706;border:0.5px solid rgba(245,158,11,.3);}
/* RISK */
.alloc-row{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
.alloc-l{font-size:11px;font-family:'IBM Plex Mono',monospace;min-width:55px;}
.alloc-bg{flex:1;height:4px;background:var(--color-background-tertiary);border-radius:2px;overflow:hidden;}
.alloc-fill{height:100%;border-radius:2px;transition:width .3s;}
.alloc-pct{font-size:11px;font-family:'IBM Plex Mono',monospace;color:var(--color-text-secondary);min-width:40px;text-align:right;}
.warn-b{font-size:9px;font-family:'IBM Plex Mono',monospace;padding:1px 5px;border-radius:3px;background:rgba(239,68,68,.1);color:#dc2626;border:0.5px solid rgba(239,68,68,.3);margin-left:4px;}
.stop-inp{width:90px;font-family:'IBM Plex Mono',monospace;font-size:11px;padding:3px 6px;border:0.5px solid var(--color-border-secondary);border-radius:3px;background:var(--color-background-secondary);color:var(--color-text-primary);outline:none;}
/* LOG */
.tr-add{display:grid;grid-template-columns:85px 65px auto 80px 80px 1fr auto;gap:6px;align-items:end;padding:9px 14px;background:var(--color-background-secondary);border-top:0.5px solid var(--color-border-tertiary);}
.tr-add label{font-size:9px;color:var(--color-text-secondary);font-family:'IBM Plex Mono',monospace;display:block;margin-bottom:2px;}
.tr-add input,.tr-add select{width:100%;font-family:'IBM Plex Mono',monospace;font-size:11px;padding:4px 6px;border:0.5px solid var(--color-border-secondary);border-radius:4px;background:var(--color-background-primary);color:var(--color-text-primary);outline:none;}
.insight-box{border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);padding:10px 12px;background:var(--color-background-secondary);font-size:12px;line-height:1.7;}
.insight-box strong{font-weight:500;}
/* VOL */
.vi{flex:1;font-family:'IBM Plex Mono',monospace;font-size:13px;padding:7px 10px;border-radius:6px;border:0.5px solid var(--color-border-secondary);background:var(--color-background-secondary);color:var(--color-text-primary);outline:none;text-transform:uppercase;}
</style>

<h2 class="sr-only">GS Equity Terminal v3.5 — 決策引擎升級版</h2>
<div class="T">
  <div class="HDR">
    <div style="display:flex;align-items:center;">
      <div class="hlog"><svg width="14" height="14" viewBox="0 0 14 14" fill="none"><rect x="1" y="4" width="12" height="6" rx="1" fill="var(--color-background-primary)" opacity=".9"/><rect x="3" y="6" width="2" height="2" fill="var(--color-text-primary)"/><rect x="6" y="6" width="2" height="2" fill="var(--color-text-primary)"/><rect x="9" y="6" width="2" height="2" fill="var(--color-text-primary)"/></svg></div>
      <div>
        <div class="ht"><span class="sd"></span>GS Equity Terminal <span style="color:var(--color-text-tertiary);font-size:10px">v3.5</span></div>

      </div>

    <button class="tb" onclick="sw('brief')">📰 早報+事件</button>

    <button class="tb" onclick="sw('pf')">💼 持倉</button>
    <button class="tb" onclick="sw('risk')">⚠️ 風險控制</button>
    <button class="tb" onclick="sw('log')">📋 交易紀錄</button>

<script>
/* ═══════════════ SYSTEM PROMPTS ═══════════════ */
const SYS_MAIN=`You are a senior Goldman Sachs equity analyst. Portfolio via 永豐大戶投. Holdings: 0050×107(cost NT$75.44), 2330×24(cost NT$1,858), cash ~NT$117,000. Budget NT$10k/mo. Drawdown -20%. TW: short/mid/long OK. US: short/mid only. Always web search latest data. Reply Traditional Chinese. **bold** key figures. Format: 當前市況→技術重點→操作建議(entry/exit/stop)→風險提示.`;

const SYS_DEC=`You are GS Equity Terminal v3.5 — a trading DECISION ENGINE, not an analyst.
Your task: output ONE executable trading decision using this 7-step mandatory process:

STEP 1: Market Regime (bull/range/bear) — search TAIEX/S&P500 vs MA20/MA60
STEP 2: Stock trend — price vs MA20, MA60
STEP 3: Volume — vs 20-day avg, divergence, anomalies
STEP 4: Bubble check — if extreme premium → 🔴 no BUY
STEP 5: Shakeout check — if healthy pullback with support → 🟢 boost BUY confidence
STEP 6: Event risk — earnings/CPI/Fed within 5 days
STEP 7: Risk control — concentration, stop distance, portfolio drawdown

DECISION RULES (priority order):
1. market=bear → CANNOT BUY
2. bubble=🔴 → FORCE REDUCE
3. near stop loss → STOP
4. shakeout=🟢 + uptrend → BUY
5. else → WATCH

STABILITY: Do NOT change signal unless: stop triggered, regime change, or extreme risk event.

Return ONLY raw JSON (no backticks, no markdown):
{"signal":"BUY","confidence":72,"timeframe":"swing","holding_period":"2-4週","scores":{"trend":75,"volume":60,"market":80},"position_size":0.15,"levels":{"entry":195.5,"target":215,"stop":188},"market_regime":"bull","risk_flags":["event"],"decision_reason":"站上MA20月線+縮量回測支撐，多頭格局完整；近期無重大事件風險。建議15%倉位分批進場。","signal_stability":"維持 — 未觸發任何改變條件"}`;

const SYS_BRIEF={
  tw_pre:`GS analyst. Search TODAY Taiwan pre-market data. 盤前摘要 Traditional Chinese: ①期貨/ADR訊號 ②重要隔夜因素 ③今日焦點個股 ④整體情緒 with numbers.`,
  tw_post:`GS analyst. Search TODAY TAIEX closing. 盤後摘要 Traditional Chinese: ①收盤數據 ②強弱族群 ③量能vs均量 ④明日預判 with numbers.`,
  us_pre:`GS analyst. Search TODAY US pre-market. 美股盤前摘要 Traditional Chinese: ①三大期貨 ②盤前個股 ③重要數據 ④情緒 with numbers.`,
  us_post:`GS analyst. Search TODAY US close. 美股盤後摘要 Traditional Chinese: ①三大指數漲跌幅 ②盤後個股 ③財報 ④明日催化劑 with numbers.`
};

const SYS_EVENTS=`GS analyst. Search upcoming events NEXT 7 days: earnings (NVDA,TSM,tech), Fed/ECB, Taiwan economic data, geopolitical. Return ONLY JSON array:
[{"date":"5/1","title":"NVDA財報","sub":"AI概念股關鍵催化劑","risk":"high"}]
risk: high/medium/low. ONLY JSON array.`;

const SYS_REG=`GS quant. Search current Taiwan TAIEX and US S&P500 regime. Return ONLY JSON:

/* ═══════════════ API ═══════════════ */
async function callAI(msgs,sys,web=true){
  const b={model:'claude-sonnet-4-20250514',max_tokens:1000,system:sys,messages:msgs};
  if(web)b.tools=[{type:'web_search_20250305',name:'web_search'}];
  const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(b)});
  const d=await r.json();
  let t='';if(d.content)for(const b of d.content)if(b.type==='text')t+=b.text;
  return t||(d.error?'錯誤:'+d.error.message:'');
}

/* ═══════════════ YAHOO FINANCE ═══════════════ */
async function fetchYahoo(code,market){
  const sym=market==='TW'?code+'.TW':code;
  const url=`https://query1.finance.yahoo.com/v8/finance/chart/${sym}?interval=1d&range=2d&corsDomain=finance.yahoo.com`;
  try{
    const r=await fetch(url,{headers:{'User-Agent':'Mozilla/5.0'}});
    if(!r.ok)throw new Error('HTTP '+r.status);
    const d=await r.json();
    const meta=d.chart?.result?.[0]?.meta;
    if(!meta?.regularMarketPrice)throw new Error('no price');
    const price=meta.regularMarketPrice;
    const prev=meta.chartPreviousClose||meta.previousClose||price;
    const chg=(price-prev)/prev*100;
    return{price,chg,src:'yahoo'};
  }catch(e){return null;}
}

async function fetchYahooFull(code,market){
  const sym=market==='TW'?code+'.TW':code;
  const url=`https://query2.finance.yahoo.com/v10/finance/quoteSummary/${sym}?modules=price,summaryDetail,defaultKeyStatistics`;
  try{
    const r=await fetch(url);if(!r.ok)throw new Error('HTTP '+r.status);
    const d=await r.json();
    const price=d.quoteSummary?.result?.[0]?.price;
    if(!price)throw new Error('no data');
    return{
      price:price.regularMarketPrice?.raw,
      chg:price.regularMarketChangePercent?.raw*100||0,
      vol:price.regularMarketVolume?.raw,
      mktCap:price.marketCap?.fmt,
      pe:d.quoteSummary.result[0].summaryDetail?.trailingPE?.raw,
      src:'yahoo'
    };
  }catch(e){return null;}
}

/* ═══════════════ HELPERS ═══════════════ */
function parseJSON(raw){
  const c=raw.replace(/```json|```/g,'').trim();
  try{return JSON.parse(c);}catch(e){}
  const m=c.match(/\{[\s\S]*\}|\[[\s\S]*\]/);
  if(m)try{return JSON.parse(m[0]);}catch(e){}
  return null;
}

function fmt(t){
  if(!t)return'';
  t=t.replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>');
  t=t.replace(/## ?(.*?)(\n|$)/g,'<div style="font-size:10px;font-weight:500;color:var(--color-text-secondary);font-family:\'IBM Plex Mono\',monospace;letter-spacing:.05em;margin:7px 0 3px;text-transform:uppercase">$1</div>');
  t=t.replace(/\n/g,'<br>');
  return t;
}

function nt(n,d=0){if(n===null||n===undefined||isNaN(n))return'---';return Number(n).toLocaleString('zh-TW',{minimumFractionDigits:d,maximumFractionDigits:d});}
function scoreColor(v){return v>=70?'#16a34a':v>=50?'#d97706':'#dc2626';}
function confColor(c){return c>=80?'#16a34a':c>=60?'#d97706':c>=40?'#888':'#dc2626';}

async function fetchDec(){
  const di=document.getElementById('DI');const code=(di?.value||'').trim().toUpperCase();if(!code)return;
  S.decCode=code;S.decLoad=true;S.decResult=null;S.decSteps=[];render();

  // Simulate step progression
  const stepInterval=setInterval(()=>{
    if(S.decSteps.length<7&&S.decLoad){S.decSteps.push(S.decSteps.length);render();}
    else{clearInterval(stepInterval);}
  },600);

  try{
    // Try Yahoo Finance first for context
    const pf=S.pf.find(p=>p.code===code);
    const yData=await fetchYahoo(code,pf?.market||'TW');
    const priceCtx=yData?`Current price from Yahoo Finance: ${yData.price} (${yData.chg>=0?'+':''}${yData.chg.toFixed(2)}%). `:'';
    const res=await callAI([{role:'user',content:`${priceCtx}Execute 7-step decision analysis for stock: ${code}. Search all required data. Return ONLY JSON.`}],SYS_DEC,true);
    clearInterval(stepInterval);S.decSteps=[0,1,2,3,4,5,6];
    const p=parseJSON(res);S.decResult=p||{_raw:res};
  }catch(e){clearInterval(stepInterval);S.decResult={error:e.message};}
  S.decLoad=false;render();const di2=document.getElementById('DI');if(di2)di2.value=code;
}

  catch(e){S.regime={_err:true,conclusion:'錯誤:'+e.message};}
  S.regLoad=false;render();
}
async function analyzeVol(){
  const vi=document.getElementById('VI');const code=(vi?.value||'').trim().toUpperCase();if(!code)return;
  S.volLoad=true;S.volRes=null;render();
  try{S.volRes=await callAI([{role:'user',content:`搜尋並分析 ${code} 最新量能數據，結合當前市場狀態給完整量能解讀與操作建議`}],SYS_VOL,true);}
  catch(e){S.volRes='錯誤:'+e.message;}
  S.volLoad=false;render();const vi2=document.getElementById('VI');if(vi2)vi2.value=code;
}

/* ═══════════════ PORTFOLIO ═══════════════ */
function getPnl(p){
  const cp=S.prices[p.code];if(!cp&&cp!==0)return{cur:'---',pl:'---',plp:'---',pos:null,src:null};
  const cur=parseFloat(cp);const mv=cur*p.shares;const cb=p.cost*p.shares;const pl=mv-cb;const plp=pl/cb*100;
  return{cur:nt(cur,cur<100?2:0),pl:(pl>=0?'+':'')+nt(pl,0),plp:(plp>=0?'+':'')+plp.toFixed(2)+'%',pos:pl>=0,src:S.priceSrc[p.code]};
}
function pfSt(){let tc=0,tm=0,hp=true;S.pf.forEach(p=>{tc+=p.cost*p.shares;if(S.prices[p.code]!==undefined)tm+=S.prices[p.code]*p.shares;else hp=false;});return{tc,tm:hp?tm:null,pl:hp?tm-tc:null,tot:hp?tm+S.cash:null};}

function rPF(){
  const st=pfSt();
  return `<div class="pf-stats">
    <div class="sc"><div class="sl">投入成本</div><div class="sv mono">${nt(st.tc,0)}</div></div>
    <div class="sc"><div class="sl">市值</div><div class="sv mono">${st.tm?nt(st.tm,0):'---'}</div></div>
    <div class="sc"><div class="sl">未實現損益</div><div class="sv mono ${st.pl===null?'':(st.pl>=0?'pos':'neg')}">${st.pl===null?'---':(st.pl>=0?'+':'')+nt(st.pl,0)}</div></div>
    <div class="sc"><div class="sl">總資產</div><div class="sv mono">${st.tot?nt(st.tot,0):'---'}</div></div>
  </div>
  <div style="padding:7px 14px;display:flex;align-items:center;justify-content:space-between;">
    <div class="sh" style="margin:0">持倉明細</div>
    <div style="display:flex;gap:6px;align-items:center;">
      <span style="font-size:9px;font-family:'IBM Plex Mono',monospace;color:var(--color-text-tertiary)">
        ${Object.keys(S.prices).length>0?`${Object.values(S.priceSrc).filter(s=>s==='yahoo').length}/${S.pf.length} Yahoo`:''}
      </span>
      <button class="fbtn" onclick="rfp()" ${S.priceLoad?'disabled':''}>${S.priceLoad?'<span class="dots"><span></span><span></span><span></span></span>':'刷新現價'}</button>
      <button class="fbtn" onclick="S.showAdd=!S.showAdd;render()">+ 新增</button>
    </div>
  </div>
  <div style="padding:0 14px;">
    <div class="card"><table class="pf-tbl"><thead><tr><th>代號</th><th>名稱</th><th>市場</th><th>股數</th><th>成本</th><th>現價</th><th>來源</th><th>損益</th><th>%</th><th></th></tr></thead><tbody>
    ${S.pf.map((p,i)=>{const v=getPnl(p);const e=S.editIdx===i;return`<tr>
      <td class="mono" style="font-weight:500">${p.code}</td>
      <td style="font-size:11px">${p.name}</td>
      <td><span class="mkt-b ${p.market==='TW'?'tw-b':'us-b'}">${p.market}</span></td>
      <td>${e?`<input type="number" id="e_s_${i}" value="${p.shares}">`:`<span class="mono">${nt(p.shares,0)}</span>`}</td>
      <td>${e?`<input type="number" id="e_c_${i}" value="${p.cost}" step="0.01">`:`<span class="mono">${nt(p.cost,p.cost<100?2:0)}</span>`}</td>
      <td class="mono">${v.cur}</td>
      <td>${v.src?`<span class="${v.src==='yahoo'?'yahoo-b':'ai-b'}">${v.src==='yahoo'?'YF':'AI'}</span>`:''}</td>
      <td class="mono ${v.pos===null?'':(v.pos?'pos':'neg')}">${v.pl}</td>
      <td class="mono ${v.pos===null?'':(v.pos?'pos':'neg')}">${v.plp}</td>
      <td style="white-space:nowrap">${e?`<button class="icobtn" onclick="saveEdit(${i})">✓</button><button class="icobtn" onclick="S.editIdx=-1;render()">✕</button>`:`<button class="icobtn" onclick="S.editIdx=${i};render()">✏</button><button class="icobtn" onclick="delPos(${i})">✗</button>`}</td>
    </tr>`;}).join('')}
    </tbody></table></div>
  </div>
  ${S.showAdd?`<div class="add-form"><div><label>代號</label><input id="n_c" placeholder="0050"></div><div><label>名稱</label><input id="n_n" placeholder="元大台灣50"></div><div><label>市場</label><select id="n_m"><option value="TW">台股</option><option value="US">美股</option></select></div><div><label>股數</label><input id="n_s" type="number" placeholder="100"></div><div><label>成本</label><input id="n_p" type="number" placeholder="100" step="0.01"></div><button class="abtn" onclick="addPos()">新增</button></div>`:''}
  <div class="cash-bar"><span class="cash-l">現金 NT$</span><input class="cash-i" type="number" value="${S.cash}" onchange="S.cash=parseFloat(this.value)||0;save();render()"><span style="font-size:10px;color:var(--color-text-secondary);font-family:'IBM Plex Mono',monospace">待投入</span></div>
  <div style="padding:8px 14px;display:flex;gap:7px;">
    <button class="abtn s" style="font-size:11px;padding:6px 12px" onclick="sw('chat');setTimeout(()=>{const ci=document.getElementById('CI');if(ci){ci.value='根據我的持倉'+S.pf.map(p=>p.code+'×'+p.shares+'@'+p.cost).join(',')+'現金'+S.cash+'，給我持倉最佳化建議';ar(ci);}},100)">AI 持倉建議 ↗</button>
  </div>`;
}

function saveEdit(i){const s=parseFloat(document.getElementById('e_s_'+i)?.value)||0;const c=parseFloat(document.getElementById('e_c_'+i)?.value)||0;S.pf[i].shares=s;S.pf[i].cost=c;S.editIdx=-1;save();render();}
function delPos(i){S.pf.splice(i,1);save();render();}
function addPos(){const c=(document.getElementById('n_c')?.value||'').trim().toUpperCase();const n=(document.getElementById('n_n')?.value||'').trim()||c;const m=document.getElementById('n_m')?.value||'TW';const s=parseFloat(document.getElementById('n_s')?.value)||0;const p=parseFloat(document.getElementById('n_p')?.value)||0;if(!c||s<=0)return;S.pf.push({code:c,name:n,shares:s,cost:p,market:m});S.showAdd=false;save();render();}

async function rfp(){
  S.priceLoad=true;render();
  for(const p of S.pf){
    const yData=await fetchYahoo(p.code,p.market);
    if(yData){S.prices[p.code]=yData.price;S.priceSrc[p.code]='yahoo';}
    else{
      // fallback to AI
      try{
        const res=await callAI([{role:'user',content:`Search current price for ${p.code}${p.market==='TW'?'.TW':''} stock. Return ONLY JSON: {"price":123.45,"chg":1.2}`}],`Return ONLY JSON with current stock price. No text.`,true);
        const d=parseJSON(res);
        if(d?.price){S.prices[p.code]=d.price;S.priceSrc[p.code]='ai';}
      }catch(e){}
    }
  }
  S.priceLoad=false;save();render();
}

/* ═══════════════ RISK ═══════════════ */
function computeRisk(){
  const positions=S.pf.map(p=>{const cp=S.prices[p.code]!==undefined?S.prices[p.code]:p.cost;const mv=cp*p.shares;const cb=p.cost*p.shares;const sl=S.stopLoss[p.code]||(p.cost*0.95);const maxLoss=(cp-sl)*p.shares;return{...p,price:cp,mv,cb,sl,maxLoss,pnl:mv-cb};});
  const totalMv=positions.reduce((a,p)=>a+p.mv,0);const total=totalMv+S.cash;
  positions.forEach(p=>{p.weight=total>0?(p.mv/total*100):0;});
  const totalPnl=positions.reduce((a,p)=>a+p.pnl,0);const totalCb=positions.reduce((a,p)=>a+p.cb,0);
  return{positions,totalMv,total,totalPnl,totalCb,dd:totalCb>0?totalPnl/totalCb*100:0};
}
function rRisk(){
  const{positions,total,totalPnl,totalCb,dd}=computeRisk();
  const warns=positions.filter(p=>p.weight>30);
  return `<div class="sec">
  ${warns.length?`<div style="padding:8px 12px;border:0.5px solid rgba(239,68,68,.3);border-radius:var(--border-radius-md);background:rgba(239,68,68,.05);font-size:12px;color:#dc2626">⚠️ 集中度警告：${warns.map(p=>p.code+' '+p.weight.toFixed(0)+'%').join('、')} 建議降至30%以下</div>`:''}
  <div class="sh">📊 資產配置</div>
  <div class="card"><div class="card-bd">
    ${positions.map(p=>{const col=p.weight>40?'#ef4444':p.weight>30?'#f59e0b':'#3b82f6';return`<div class="alloc-row"><div class="alloc-l mono">${p.code}</div><div class="alloc-bg"><div class="alloc-fill" style="width:${Math.min(p.weight*2,100)}%;background:${col}"></div></div><div class="alloc-pct">${p.weight.toFixed(1)}%${p.weight>30?'<span class="warn-b">⚠</span>':''}</div></div>`;}).join('')}
    <div class="alloc-row"><div class="alloc-l mono" style="color:var(--color-text-secondary)">現金</div><div class="alloc-bg"><div class="alloc-fill" style="width:${Math.min(total>0?S.cash/total*200:0,100)}%;background:#22c55e"></div></div><div class="alloc-pct">${total>0?(S.cash/total*100).toFixed(1):0}%</div></div>
  </div></div>
  <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:7px;">
    <div class="sc"><div class="sl">組合回撤</div><div class="sv mono ${dd>=0?'pos':'neg'}">${dd.toFixed(1)}%</div></div>
    <div class="sc"><div class="sl">未實現損益</div><div class="sv mono ${totalPnl>=0?'pos':'neg'}">${(totalPnl>=0?'+':'')+nt(totalPnl,0)}</div></div>
    <div class="sc"><div class="sl">現金比</div><div class="sv mono">${total>0?(S.cash/total*100).toFixed(0):0}%</div></div>
  </div>
  <div class="sh">🛑 停損警戒</div>
  <div class="card"><table class="stop-tbl"><thead><tr><th>代號</th><th>現價/成本</th><th>停損價(-5%預設)</th><th>最大虧損NT$</th><th>狀態</th></tr></thead><tbody>
  ${positions.map(p=>{const risk=p.price<=p.sl*1.03;return`<tr>
    <td class="mono" style="font-weight:500">${p.code}</td>
    <td class="mono">${nt(p.price,p.price<100?2:0)}</td>
    <td><input class="stop-inp" type="number" value="${p.sl.toFixed(p.sl<100?2:0)}" step="${p.sl<100?0.01:1}" onchange="S.stopLoss['${p.code}']=parseFloat(this.value);save();render()"></td>
    <td class="mono neg">${nt(Math.min(p.maxLoss,0),0)}</td>
    <td>${risk?'<span style="color:#dc2626;font-size:10px;font-family:\'IBM Plex Mono\',monospace">⚠ 接近停損</span>':'<span style="color:#16a34a;font-size:10px;font-family:\'IBM Plex Mono\',monospace">正常</span>'}</td>
  </tr>`;}).join('')}
  </tbody></table></div>
  <button class="abtn s" style="font-size:11px;padding:6px 12px" onclick="sw('chat');setTimeout(()=>{const ci=document.getElementById('CI');if(ci){ci.value='分析我的投資組合風險並給降低風險的具體建議，持倉:'+S.pf.map(p=>p.code+'×'+p.shares).join(',');ar(ci);}},100)">AI 風險建議 ↗</button>
  </div>`;
}

/* ═══════════════ TRADE LOG ═══════════════ */
function tradeStats(){
  const cl=S.trades.filter(t=>t.closed&&t.exitPrice);if(!cl.length)return null;
  const calc=t=>t.action==='BUY'?(t.exitPrice-t.price)*t.shares:(t.price-t.exitPrice)*t.shares;
  const wins=cl.filter(t=>calc(t)>0);const losses=cl.filter(t=>calc(t)<=0);
  const avgW=wins.length?wins.reduce((a,t)=>a+Math.abs((t.exitPrice-t.price)/t.price*100),0)/wins.length:0;
  const avgL=losses.length?losses.reduce((a,t)=>a+Math.abs((t.exitPrice-t.price)/t.price*100),0)/losses.length:0;
  return{total:cl.length,wins:wins.length,winRate:(wins.length/cl.length*100).toFixed(0),avgW:avgW.toFixed(1),avgL:avgL.toFixed(1),ratio:avgL>0?(avgW/avgL).toFixed(1):'—',totalPnl:cl.reduce((a,t)=>a+calc(t),0)};
}
function rLog(){
  const st=tradeStats();const open=S.trades.filter(t=>!t.closed);const closed=S.trades.filter(t=>t.closed);
  return `<div class="sec">
  ${st?`<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:7px;">
    <div class="sc"><div class="sl">交易次數</div><div class="sv mono">${st.total}</div></div>
    <div class="sc"><div class="sl">勝率</div><div class="sv mono ${parseInt(st.winRate)>=50?'pos':'neg'}">${st.winRate}%</div></div>
    <div class="sc"><div class="sl">盈虧比</div><div class="sv mono ${parseFloat(st.ratio)>=1?'pos':'neg'}">${st.ratio}</div></div>
    <div class="sc"><div class="sl">累計損益</div><div class="sv mono ${st.totalPnl>=0?'pos':'neg'}">${(st.totalPnl>=0?'+':'')+nt(st.totalPnl,0)}</div></div>
  </div>`:''}
  ${S.tradeInsight?`<div class="insight-box">${fmt(typeof S.tradeInsight==='string'?S.tradeInsight:'')}</div>`:''}
  <div style="display:flex;align-items:center;justify-content:space-between;">
    <div class="sh" style="margin:0">交易明細</div>
    <div style="display:flex;gap:6px;">
      ${st&&!S.insightLoad?`<button class="fbtn" onclick="aiInsight()">AI復盤</button>`:''}
      ${S.insightLoad?`<button class="fbtn" disabled><span class="dots"><span></span><span></span><span></span></span></button>`:''}
      <button class="fbtn" onclick="S.showAddTrade=!S.showAddTrade;render()">+ 記錄</button>
    </div>
  </div>
  ${S.trades.length===0?`<div style="padding:20px;border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);background:var(--color-background-secondary);text-align:center;font-size:11px;color:var(--color-text-tertiary)">尚無交易紀錄。點「+ 記錄」開始追蹤</div>`
  :`<div class="card"><table class="log-tbl"><thead><tr><th>日期</th><th>代號</th><th>方向</th><th>進場</th><th>股數</th><th>出場</th><th>損益</th><th></th></tr></thead><tbody>
  ${[...open,...closed].map(t=>{const idx=S.trades.indexOf(t);const pl=t.exitPrice?((t.action==='BUY'?(t.exitPrice-t.price):(t.price-t.exitPrice))*t.shares):null;return`<tr>
    <td class="mono" style="font-size:10px">${t.date}</td>
    <td class="mono" style="font-weight:500">${t.code}</td>
    <td style="color:${t.action==='BUY'?'#16a34a':'#dc2626'};font-size:11px">${t.action==='BUY'?'買進':'賣出'}</td>
    <td class="mono">${nt(t.price,2)}</td>
    <td class="mono">${nt(t.shares,0)}</td>
    <td class="mono">${t.exitPrice?nt(t.exitPrice,2):'—'}</td>
    <td class="mono ${pl===null?'':(pl>=0?'pos':'neg')}">${pl===null?'—':(pl>=0?'+':'')+nt(pl,0)}</td>
    <td style="white-space:nowrap">${!t.closed?`<button class="icobtn" onclick="closePrompt(${idx})">⬛</button>`:''}<button class="icobtn" onclick="S.trades.splice(${idx},1);save();render()">✗</button></td>
  </tr>`;}).join('')}
  </tbody></table></div>`}
  ${S.showAddTrade?`<div class="tr-add">
    <div><label>代號</label><input id="t_c" placeholder="2330"></div>
    <div><label>市場</label><select id="t_m"><option>TW</option><option>US</option></select></div>
    <div><label>方向</label><select id="t_a"><option value="BUY">買進</option><option value="SELL">賣出</option></select></div>
    <div><label>進場價</label><input id="t_p" type="number" placeholder="800" step="0.01"></div>
    <div><label>股數</label><input id="t_s" type="number" placeholder="10"></div>
    <div><label>進場原因</label><input id="t_r" placeholder="突破月線+放量"></div>
    <button class="abtn" onclick="addTrade()">新增</button>
  </div>`:''}
  </div>`;
}
function addTrade(){
  const code=(document.getElementById('t_c')?.value||'').trim().toUpperCase();
  const action=document.getElementById('t_a')?.value||'BUY';
  const price=parseFloat(document.getElementById('t_p')?.value)||0;
  const shares=parseFloat(document.getElementById('t_s')?.value)||0;
  const reason=(document.getElementById('t_r')?.value||'').trim();
  if(!code||price<=0||shares<=0)return;
  const d=new Date();const date=`${d.getFullYear()}/${d.getMonth()+1}/${d.getDate()}`;
  S.trades.push({date,code,action,price,shares,reason,closed:false,exitPrice:null});
  S.showAddTrade=false;save();render();
}
function closePrompt(i){const ep=parseFloat(prompt('輸入出場價格：'));if(!ep||isNaN(ep))return;S.trades[i].exitPrice=ep;S.trades[i].closed=true;save();render();}
async function aiInsight(){
  S.insightLoad=true;render();
  const cl=S.trades.filter(t=>t.closed&&t.exitPrice);
  const sum=cl.map(t=>{const pl=t.action==='BUY'?(t.exitPrice-t.price)*t.shares:(t.price-t.exitPrice)*t.shares;return`${t.code} ${t.action} ${t.price}→${t.exitPrice} ×${t.shares} P&L:${pl.toFixed(0)} reason:${t.reason||'—'}`;}).join('\n');
  try{
    const res=await callAI([{role:'user',content:`Analyze: ${sum}\nReturn ONLY JSON: {winRate,wins,losses,total,avgWinPct,avgLossPct,ratio,bestPattern,worstPattern,conclusion,suggestions[]}`}],'Return ONLY JSON analysis of trade records.',false);
    const d=parseJSON(res);
    if(d)S.tradeInsight=`<strong>📊 AI復盤</strong><br><br>勝率 <strong>${d.winRate}%</strong> · 盈虧比 <strong>${d.ratio}</strong> · 平均盈+${d.avgWinPct}% / 平均虧-${d.avgLossPct}%<br><br>✅ 最佳模式：${d.bestPattern}　❌ 最差模式：${d.worstPattern}<br><br>💡 ${d.conclusion}<br><br>${(d.suggestions||[]).map((s,i)=>`${i+1}. ${s}`).join('<br>')}`;
    else S.tradeInsight=res;
  }catch(e){S.tradeInsight='錯誤:'+e.message;}
  S.insightLoad=false;render();
}

/* ═══════════════ PERSIST ═══════════════ */
async function save(){try{await window.storage.set('gsv35',JSON.stringify({pf:S.pf,cash:S.cash,stopLoss:S.stopLoss,trades:S.trades}));}catch(e){}}
async function load(){try{const r=await window.storage.get('gsv35');if(r){const d=JSON.parse(r.value);if(d.pf)S.pf=d.pf;if(d.cash!==undefined)S.cash=d.cash;if(d.stopLoss)S.stopLoss=d.stopLoss;if(d.trades)S.trades=d.trades;}}catch(e){}}

(async()=>{await load();render();})();
</script>
